      transform="translate(128 128) rotate(15) translate(-128 -128)" />

    <path
      id="inner-gear-path"
      d="M 198.13 114.05 L 198.13 141.95 L 192.56 145.30 A 66.84 66.84 0 0 1 185.88 161.42 L 187.45 167.72 L 167.72 187.45 L 161.42 185.88 A 66.84 66.84 0 0 1 145.30 192.56 L 141.95 198.13 L 114.05 198.13 L 110.70 192.56 A 66.84 66.84 0 0 1 94.58 185.88 L 88.28 187.45 L 68.55 167.72 L 70.12 161.42 A 66.84 66.84 0 0 1 63.44 145.30 L 57.87 141.95 L 57.87 114.05 L 63.44 110.70 A 66.84 66.84 0 0 1 70.12 94.58 L 68.55 88.28 L 88.28 68.55 L 94.58 70.12 A 66.84 66.84 0 0 1 110.70 63.44 L 114.05 57.87 L 141.95 57.87 L 145.30 63.44 A 66.84 66.84 0 0 1 161.42 70.12 L 167.72 68.55 L 187.45 88.28 L 185.88 94.58 A 66.84 66.84 0 0 1 192.56 110.70 Z" />

    <g id="core-ring-layer">
      <circle
        cx="128"
        cy="128"
        r="40"
        fill="none"
        stroke="currentColor"
        stroke-width="3.5"
        pathLength="8"
        stroke-dasharray="0.5 0.5"
        stroke-dashoffset="0.25" />
    </g>
  </defs>

  <g transform="scale(1.6875)">
    <use href="#outer-gear-path" fill="#E8E2D0" clip-path="url(#left-split)" />
    <use href="#outer-gear-path" fill="#9E1B1B" clip-path="url(#right-split)" />

    <use href="#inner-gear-path" fill="#9E1B1B" clip-path="url(#left-split)" />
    <use href="#inner-gear-path" fill="#E8E2D0" clip-path="url(#right-split)" />

    <use
      href="#outer-gear-path"
      fill="none"
      stroke="#C5A059"
      stroke-width="3"
      stroke-linejoin="round"
      stroke-linecap="round" />

    <use
      href="#inner-gear-path"
      fill="none"
      stroke="#C5A059"
      stroke-width="3"
      stroke-linejoin="round"
      stroke-linecap="round" />

    <use
      href="#core-ring-layer"
      color="#E8E2D0"
      clip-path="url(#left-split)" />

    <use
      href="#core-ring-layer"
      color="#9E1B1B"
      clip-path="url(#right-split)" />
  </g>
