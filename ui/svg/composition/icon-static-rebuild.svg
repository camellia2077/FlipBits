<svg xmlns="http://www.w3.org/2000/svg" width="432" height="432" viewBox="0 0 432 432">
  <title>FlipBits Static Rebuild Preview</title>
  <desc>
    Static rebuild preview using split fills plus the extracted outer gear,
    inner gear, and core ring geometry. This file is for visual validation
    before the Android animation translation.
  </desc>

  <defs>
    <clipPath id="left-split">
      <rect x="0" y="0" width="128" height="256" />
    </clipPath>
    <clipPath id="right-split">
